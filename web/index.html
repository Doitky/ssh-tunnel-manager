
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSH Tunnel Manager</title>
<link rel="stylesheet" href="/web/style.css?v=2">
</head>
<body>
<div id="login">
  <h2>SSH Tunnel Manager</h2>
  <input id="tokenInput" type="password" placeholder="访问口令">
  <button id="loginBtn">登录</button>
  <p id="loginMsg"></p>
</div>
<div id="app">
  <div id="sidebar">
    <div class="sidebar-head">
      <h2>会话列表</h2>
    </div>
    <div class="toolbar sidebar-toolbar">
      <button class="act" id="newBtn">+ 新建</button>
      <button class="act" id="connectBtn">连接</button>
      <button class="act" id="disconnectBtn">断开</button>
      <button class="act" id="editBtn">编辑</button>
      <button class="act" id="deleteBtn">删除</button>
      <button class="act" id="connectAllBtn">全部连接</button>
      <button class="act" id="disconnectAllBtn">全部断开</button>
      <button class="act" id="refreshBtn">↻ 刷新</button>
    </div>
    <div id="sessionListWrap" class="session-table-wrap">
      <table id="sessionTable">
        <thead><tr>
          <th>名称</th><th>主机</th><th>端口</th><th>用户</th>
          <th>状态</th><th>方向</th><th>本地端口</th>
        </tr></thead>
        <tbody id="sessionList"></tbody>
      </table>
    </div>
  </div>
  <div id="detail">
    <div id="editor" style="display:none">
      <h3 id="editorTitle">新建会话</h3>
      <div class="form-grid">
        <label class="f-row" for="f_name"><span class="f-label">名称</span><input id="f_name" class="f-input"></label>
        <label class="f-row" for="f_host"><span class="f-label">主机</span><input id="f_host" class="f-input"></label>
        <label class="f-row" for="f_port"><span class="f-label">端口</span><input id="f_port" type="number" value="22" class="f-input"></label>
        <label class="f-row" for="f_username"><span class="f-label">用户名</span><input id="f_username" class="f-input"></label>
        <label class="f-row" for="f_auth"><span class="f-label">认证</span>
          <select id="f_auth" class="f-input"><option value="password">密码</option><option value="key">密钥</option></select></label>
        <div class="f-row" id="pwdRow"><label for="f_password"><span class="f-label">密码</span><input id="f_password" type="password" class="f-input"></label></div>
        <div class="f-row" id="keyRow" style="display:none"><label for="f_keypath"><span class="f-label">密钥路径</span><input id="f_keypath" class="f-input"></label></div>
        <label class="f-row" for="f_keepalive"><span class="f-label">心跳间隔(秒)</span><input id="f_keepalive" type="number" value="30" class="f-input"></label>
        <label class="f-row f-check" for="f_keepalive_on"><input id="f_keepalive_on" type="checkbox" checked>启用心跳</label>
        <label class="f-row" for="f_reconnect"><span class="f-label">重连间隔(秒)</span><input id="f_reconnect" type="number" value="10" class="f-input"></label>
        <label class="f-row f-check" for="f_reconnect_on"><input id="f_reconnect_on" type="checkbox">启用自动重连</label>
      </div>
      <h4>端口转发规则</h4>
      <table id="rulesTable"><tr><th>方向</th><th>本地端口</th><th>远程主机</th><th>远程端口</th><th>操作</th></tr></table>
      <button class="act" id="addRuleBtn">+ 添加规则</button>
      <div class="toolbar" style="margin-top:1rem">
        <button class="act" id="saveBtn">保存</button>
        <button class="act" id="cancelBtn">取消</button>
      </div>
    </div>
    <div id="view">
      <div class="panel">
        <div class="panel-head"><h2>连接日志</h2></div>
        <div class="panel-body"><pre id="log"></pre></div>
      </div>
    </div>
  </div>
</div>
<script src="/web/app.js?v=2"></script>
</body>
</html>
